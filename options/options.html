<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Proposal Bot — LLM 설정</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="container">
      <h1>LLM 설정</h1>

      <section>
        <label for="provider">Provider</label>
        <select id="provider">
          <option value="gemini">Gemini (Google) — 무료</option>
          <option value="claude">Claude (Anthropic)</option>
          <option value="openai">OpenAI</option>
        </select>

        <label for="model">모델명</label>
        <input id="model" type="text" placeholder="예: gemini-2.0-flash, claude-sonnet-4-6, gpt-4o" />

        <label for="apiKey">API 키</label>
        <input id="apiKey" type="password" placeholder="API 키를 입력하세요" autocomplete="off" />
      </section>

      <button id="saveBtn" type="button">저장</button>
      <p id="toast" class="toast hidden">저장되었습니다.</p>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
