<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proposal Bot</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Proposal Bot</h1>
        <button id="optionsBtn" class="icon-btn" title="LLM 설정">⚙️</button>
      </header>

      <!-- LLM 설정 패널 (토글) -->
      <section id="settingsPanel" class="settings-panel hidden">
        <label for="provider">Provider</label>
        <select id="provider">
          <option value="gemini">Gemini (Google) — 무료</option>
          <option value="claude">Claude (Anthropic)</option>
          <option value="openai">OpenAI</option>
        </select>

        <label for="llmModel">모델명</label>
        <input id="llmModel" type="text" placeholder="예: gemini-2.0-flash, claude-sonnet-4-6, gpt-4o" />

        <label for="apiKey">API 키</label>
        <input id="apiKey" type="password" placeholder="API 키를 입력하세요" autocomplete="off" />

        <div class="btn-row">
          <button id="saveLlmBtn" class="secondary-btn accent-btn" type="button">저장</button>
        </div>
        <p id="llmToast" class="toast hidden">저장되었습니다.</p>
      </section>

      <!-- 프로필 섹션 -->
      <section class="profile-section">
        <h2>내 프로필</h2>
        <label for="profileRaw">경력 · 도메인 지식 · 기술스택</label>
        <textarea id="profileRaw" rows="10" placeholder="예시:
5년차 백엔드 엔지니어. Java/Spring Boot 위주로 개발했고, Kafka·PostgreSQL·AWS 사용 경험 있음.
핀테크 도메인 전문 — 결제·정산 파이프라인 설계 및 운영 경험.
기술스택: Java, Spring Boot, Kafka, PostgreSQL, Redis, AWS (ECS/RDS/SQS)"></textarea>

        <div class="btn-row">
          <button id="saveProfileBtn" class="secondary-btn" type="button">저장</button>
          <button id="summarizeBtn" class="secondary-btn accent-btn" type="button">프로필 요약하기</button>
        </div>

        <div id="summaryBox" class="summary-box hidden">
          <p class="summary-label">요약본 <span class="summary-badge">캐시됨</span></p>
          <p id="summaryText" class="summary-text"></p>
          <button id="clearSummaryBtn" class="clear-btn" type="button">요약 삭제 (재요약)</button>
        </div>

        <p id="profileToast" class="toast hidden">저장되었습니다.</p>
      </section>

      <div id="result" class="result hidden"></div>

      <button id="analyzeBtn" type="button">이 페이지 분석</button>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
