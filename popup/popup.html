<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Career Matchpoint</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div class="header-title">
          <img src="../icons/icon48.png" alt="Career Matchpoint" class="header-icon" />
          <h1>Career Matchpoint</h1>
        </div>
      </header>

      <p class="subtitle">프로필과 API 키를 먼저 설정해 주세요.<br>채용공고 페이지에서 분석 버튼을 누르면<br>나만의 취업 전략을 알려드려요.</p>

      <div id="result" class="result hidden"></div>

      <!-- 프로필 섹션 -->
      <section class="panel">
        <div class="panel-header" id="profileToggle" role="button" tabindex="0">
          <span class="toggle-icon">›</span>
          <span class="panel-title">내 프로필</span>
        </div>
        <div class="panel-body" id="profileBody">
          <label for="profileRaw">나의 경력 · 도메인 지식 · 기술스택 등을 입력해주세요.<br><span class="label-note">(데이터는 브라우저 내에만 저장되며, 서버로 전송되지 않아요.)</span></label>
          <textarea id="profileRaw" rows="6" placeholder="500~2,000자 내외를 권장해요. 경력이 없다면 학습 중인 기술과 프로젝트 경험도 좋아요!

예시)
AI/ML 엔지니어 6년차. Python, PyTorch, TensorFlow 전문.
도메인: 추천시스템, 자연어처리(NLP), 컴퓨터비전, MLOps.
현재: LLM 파인튜닝 및 RAG 파이프라인 설계·운영.

기술스택:
- ML/DL: PyTorch, TensorFlow, HuggingFace Transformers, LangChain
- MLOps: MLflow, Kubeflow, Airflow, Docker, Kubernetes
- 데이터: Spark, Kafka, Redshift, PostgreSQL, MongoDB
- 인프라: AWS(SageMaker, EC2, S3, Lambda), GCP(Vertex AI)
- 서빙: FastAPI, TorchServe, Triton Inference Server

주요 경험:
- LLM 파인튜닝: LLaMA3, Mistral 기반 도메인 특화 모델 학습. LoRA/QLoRA 적용으로 GPU 비용 60% 절감.
- RAG 파이프라인: Elasticsearch + pgvector 기반 하이브리드 검색, 답변 정확도 73% → 91% 향상.
- 추천시스템: Two-Tower 모델 설계, 실시간 피처 서빙(Redis), DAU 200만 서비스 A/B 테스트 운영.
- 이상탐지: 금융 거래 데이터 기반 이상탐지 모델 (Isolation Forest + LSTM), False Positive 40% 감소.
- NLP 파이프라인: 고객 리뷰 감성분석 자동화, BERT 파인튜닝, 월 50만 건 처리.

주요 프로젝트:
① 사내 LLM 챗봇 플랫폼 구축
- 기술: GPT-4o API, LangChain, pgvector, FastAPI, React
- 성과: 사내 문서 기반 QA 시스템, 직원 1,200명 사용, 문서 검색 시간 70% 단축
- 특이사항: 프롬프트 캐싱으로 API 비용 45% 절감

② 실시간 추천 엔진 (이커머스)
- 기술: Two-Tower, Kafka, Redis, Kubernetes, Triton
- 성과: CTR 18% 향상, 구매전환율 12% 개선, 지연시간 p99 기준 80ms 이하 유지
- 규모: 일 거래 500만 건, 상품 카탈로그 300만 개

③ MLOps 플랫폼 내재화
- 기술: Kubeflow, MLflow, Airflow, ArgoCD, Grafana
- 성과: 모델 배포 주기 2주 → 1일로 단축, 실험 추적 자동화, 롤백 시간 90% 감소
- 팀: ML 엔지니어 8명 대상 플랫폼 도입 및 교육 주도

자격증: AWS Certified ML Specialty, Google Professional ML Engineer
논문: KDD 2023 워크샵 발표 (추천시스템 Cold-Start 문제 해결)"></textarea>

          <p id="profileToast" class="toast hidden">저장되었습니다.</p>
        </div>
      </section>

      <!-- 설정 섹션 -->
      <section class="panel">
        <div class="panel-header" id="settingsToggle" role="button" tabindex="0">
          <span class="toggle-icon">›</span>
          <span class="panel-title">LLM 설정</span>
        </div>
        <div class="panel-body" id="settingsBody">
          <label for="provider">Provider</label>
          <select id="provider">
            <option value="gemini">Gemini (Google)</option>
            <option value="claude">Claude (Anthropic)</option>
            <option value="openai">OpenAI</option>
          </select>

          <label for="llmModel">모델</label>
          <select id="llmModel"></select>

          <label for="apiKey">API 키
            <button id="helpBtn" class="help-btn" type="button">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                <path d="M12 16v-4m0-4h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </label>
          <div class="input-with-btn">
            <input id="apiKey" type="password" placeholder="API 키를 입력하세요" autocomplete="off" />
            <button id="toggleApiKey" class="eye-btn" type="button" title="API 키 보기/숨기기" aria-pressed="false">
              <svg id="eyeOpen" width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 5C7 5 2.73 8.11 1 12.5 2.73 16.89 7 20 12 20s9.27-3.11 11-7.5C21.27 8.11 17 5 12 5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" fill="currentColor"/>
              </svg>
              <svg id="eyeClosed" width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" class="hidden">
                <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75C21.27 7.11 17 4 12 4c-1.27 0-2.49.2-3.64.57l2.17 2.17C11.21 6.62 11.6 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78 3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" fill="currentColor"/>
              </svg>
            </button>
          </div>

          <p id="llmToast" class="toast hidden">저장되었습니다.</p>
        </div>
      </section>

      <button id="analyzeBtn" type="button">채용공고 분석하기</button>
    </main>

    <!-- 분석 중 딤 오버레이 -->
    <div id="progressOverlay" class="progress-overlay hidden">
      <div class="progress-ring">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle class="progress-ring__bg" cx="40" cy="40" r="35"/>
          <circle id="progressBar" class="progress-ring__bar" cx="40" cy="40" r="35"/>
        </svg>
        <div class="progress-pct"><span id="progressPct">0</span>%</div>
      </div>
      <div id="progressLabel" class="progress-label">준비 중...</div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
